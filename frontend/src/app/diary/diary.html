<div class="diary-container">

  <div class="diary-date-badge" *ngIf="diaryDate">
    <div class="dot"></div>
    <span>{{ diaryDate | date:'EEE · MMMM d, yyyy' }}</span>
  </div>

  <h3 class="diary-header">Today's Diary ✦</h3>

  <div class="input-group">
    <input
      type="text"
      placeholder="title of the day (◡̈)/"
      [(ngModel)]="diaryTitle" />
    <textarea
      placeholder="How was your day?"
      [(ngModel)]="diaryContent"></textarea>

    <div class="tag-group">
      <div class="tag-list">
        <span class="tag-item" *ngFor="let tag of tags; let i = index">
          # {{ tag }}
          <button class="tag-remove" (click)="removeTag(i)">✕</button>
        </span>
      </div>
      <input
        class="tag-input"
        type="text"
        placeholder="Add a tag and press Enter"
        [(ngModel)]="tagInput"
        (keydown)="onTagKeydown($event)" />
    </div>
  </div>

  <button class="save-btn" (click)="addDiaryFunction()">Save this memory ✨</button>

</div>
