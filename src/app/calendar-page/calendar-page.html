<div class="main-wrapper">
  <section class="calendar-section">
    <app-calendar 
    (dateSelect)="handleDateChange($event)"
    (diarySelect)="onDiarySelect($event)"
    ></app-calendar>
  </section>
  <section class="diary-section">
    <app-diary [diary]="selectedDiary" [day]="selectedDay"></app-diary>
  </section>
</div>
