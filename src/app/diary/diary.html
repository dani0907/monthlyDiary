<div class="diary-container">
  <h3 class="diary-header">Today's Diary</h3>

  <div class="input-group">
    <input 
      type="text" 
      placeholder="title of the day (◡̈)/" 
      [value]="diary?.title ?? ''" />
    <textarea 
      placeholder="How was your day?">{{ diary?.content ?? '' }}</textarea>
  </div>
  <button class="save-btn">Save this memory✨</button>

</div>
